<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
   <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">PostApp</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item" id="logoutBtn">
                        <a href='/'><button class="btn btn-danger ms-2" onclick="logout()">Logout</button></a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>
    <div class="container">
      <div class="row">
        <div class="col-sm-12 col-md-6 col-lg-4 ">
          <div class="card p-3 m-2 one">
            <div class="mb-3">
              <label for="exampleInputEmail1" class="form-label">Title</label>
              <input
                type="text"
                class="form-control"
                id="title"
                aria-describedby="emailHelp"
              />
            </div>
            <div class="mb-3">
              <label for="exampleFormControlTextarea1" class="form-label"
                >Description</label
              >
              <textarea
                class="form-control"
                id="description"
                rows="3"
              ></textarea>
            </div>
            <div class="mb-3 d-flex images justify-content-around">
              <img class="bgImg" onclick="selectImg('./images/1.pg.jpg')" src="./images/1.pg.jpg" alt="">
              <img class="bgImg" onclick="selectImg('./images/2.jpg')" src="./images/2.jpg" alt="">
              <img class="bgImg" onclick="selectImg('./images/3.jpg')" src="./images/3.jpg" alt="">
              <img class="bgImg" onclick="selectImg('./images/4.jpg')" src="./images/4.jpg" alt="">
              <img class="bgImg" onclick="selectImg('./images/5.jpg')" src="./images/5.jpg" alt="">
            </div>
            <button
              onclick="post()"
              type="submit"
              class="btn btn-primary ms-auto"
            >
              Post
            </button>
          </div>
        </div>
        <div class="col-sm-12 col-md-6 col-lg-8">
          <div id="posts" class="posts m-2"></div>
        </div>
      </div>
    </div>
   <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="app.js"></script>
  </body>
</html>
